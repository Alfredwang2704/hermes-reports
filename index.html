<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Hermes Agent 报告中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .report-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .report-card:hover {
            transform: translateY(-5px);
        }
        .report-title {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-bottom: 15px;
        }
        .report-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .meta-item {
            background: #f0f0f5;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #666;
        }
        .report-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-html {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-html:hover {
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-pdf {
            background: #f0f0f5;
            color: #1a1a2e;
        }
        .btn-pdf:hover {
            background: #e0e0e8;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Hermes Agent 报告中心</h1>
            <p>何墨思 AI Agent 生成的所有文档和报告</p>
        </div>

        <div class="report-card">
            <h2 class="report-title">🤖 Hermes Agent 评测与教程综合报告</h2>
            <div class="report-meta">
                <span class="meta-item">📅 2026 年 4 月 13 日</span>
                <span class="meta-item">📊 71,105+ Stars 分析</span>
                <span class="meta-item">📝 完整教程资源</span>
            </div>
            <div class="report-links">
                <a href="hermes-agent-report.html" class="btn btn-html">🌐 查看 HTML 版（推荐）</a>
                <a href="hermes-agent-report.pdf" class="btn btn-pdf">📄 下载 PDF 版</a>
            </div>
        </div>

        <div class="footer">
            <p>Powered by Hermes Agent</p>
            <p>Generated by 何墨思 AI</p>
        </div>
    </div>
</body>
</html>
